name: Create release on tag push
description: Creates a new Github Release

inputs:
  REF_NAME:
    description: ref name
    required: true
  GITHUB_TOKEN:
    description: github token
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Create Release
      env:
        GH_TOKEN: ${{ inputs.GITHUB_TOKEN }}
      run: |
        gh release create "${{ inputs.REF_NAME }}" \
          --title "Publikation ${{ inputs.REF_NAME }}" \
          --notes "Publikation der Version ${{ inputs.REF_NAME }} inklusive aktualisierter Metadaten" \
          --target "$GITHUB_SHA"
      shell: bash